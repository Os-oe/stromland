<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Stromland — ein lebendes Landschaftsgemälde des deutschen Stromnetzes</title>
<meta name="description" content="Der deutsche Strommix malt in Echtzeit ein Landschaftsgemälde: Solar wird Licht, Wind wird Bewegung, das Netz atmet mit 50 Hertz. Daten: energy-charts.info (Fraunhofer ISE).">
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #0d0b10; }
  #stage {
    position: fixed; inset: 0; overflow: hidden;
    opacity: 0; transition: opacity 1.8s ease;
  }
  #stage.ready { opacity: 1; }
  #scene { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  #hud {
    position: absolute; left: 0; right: 0;
    bottom: max(20px, env(safe-area-inset-bottom, 0px) + 14px);
    text-align: center; pointer-events: none;
    color: #efe9dc; opacity: 0.4; transition: opacity 0.5s ease;
    text-shadow: 0 1px 8px rgba(10, 8, 14, 0.55);
    user-select: none; -webkit-user-select: none;
  }
  #stage:hover #hud, #hud.wake { opacity: 1; }
  #hud-title {
    font-family: Georgia, 'Times New Roman', 'Iowan Old Style', serif;
    font-size: clamp(15px, 2.1vw, 21px);
    letter-spacing: 0.14em;
    font-weight: 400;
  }
  #hud-values {
    margin-top: 7px;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(10.5px, 1.25vw, 13px);
    letter-spacing: 0.22em;
    font-weight: 400;
    opacity: 0.85;
  }
  #hud-values .sep { margin: 0 0.7em; opacity: 0.5; }
  #hud-archive {
    margin-top: 6px;
    font-family: Georgia, serif;
    font-size: clamp(9.5px, 1.05vw, 11.5px);
    letter-spacing: 0.3em;
    opacity: 0.66;
    font-variant: small-caps;
  }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="scene"></canvas>
    <div id="hud">
      <div id="hud-title">Stromland</div>
      <div id="hud-values"></div>
      <div id="hud-archive" style="display:none"></div>
    </div>
  </div>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
